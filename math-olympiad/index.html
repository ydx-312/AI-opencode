<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥数训练题库 - 智能随机构题系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 顶栏 -->
        <header class="header">
            <div class="header-inner">
                <h1 class="logo">🧮 奥数训练题库</h1>
                <div class="header-controls">
                    <div class="difficulty-filter">
                        <span class="filter-label">难度筛选</span>
                        <button class="filter-btn active" data-difficulty="all">全部</button>
                        <button class="filter-btn" data-difficulty="普通" style="--df-color: var(--easy)">普通</button>
                        <button class="filter-btn" data-difficulty="进阶" style="--df-color: var(--medium)">进阶</button>
                        <button class="filter-btn" data-difficulty="挑战" style="--df-color: var(--hard)">挑战</button>
                    </div>
                    <button class="refresh-btn" onclick="app.refresh()">🔄 刷新题库</button>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- 左侧分类导航 -->
            <aside class="sidebar" id="sidebar">
                <nav class="category-nav" id="categoryNav">
                    <!-- 由 JS 动态生成 -->
                </nav>
            </aside>

            <!-- 主内容区 -->
            <main class="content" id="mainContent">
                <!-- 由 JS 动态生成 -->
            </main>
        </div>
    </div>

    <script src="js/problems.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
