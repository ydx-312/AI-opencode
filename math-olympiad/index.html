<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥数训练题库 - 智能随机构题系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-inner">
                <h1 class="logo">🧮 奥数训练题库</h1>
                <div class="header-controls">
                    <div class="filter-group">
                        <div class="difficulty-filter">
                            <span class="filter-label">难度</span>
                            <button class="filter-btn active" data-difficulty="all">全部</button>
                            <button class="filter-btn" data-difficulty="普通" style="--df-color: var(--easy)">普通</button>
                            <button class="filter-btn" data-difficulty="进阶" style="--df-color: var(--medium)">进阶</button>
                            <button class="filter-btn" data-difficulty="挑战" style="--df-color: var(--hard)">挑战</button>
                        </div>
                        <div class="school-filter">
                            <span class="filter-label">学段</span>
                            <button class="filter-btn school active" data-level="all">全部</button>
                            <button class="filter-btn school" data-level="小学">小学</button>
                            <button class="filter-btn school" data-level="初中">初中</button>
                            <button class="filter-btn school" data-level="高中">高中</button>
                        </div>
                    </div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap">
                        <button class="refresh-btn" onclick="app.refresh()">🔄 刷新题库</button>
                        <button class="refresh-btn" style="background:var(--medium)" onclick="app.showCustomForm()">✏️ 自定义题目</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <nav class="category-nav" id="categoryNav"></nav>
            </aside>
            <main class="content" id="mainContent"></main>
        </div>
    </div>

    <!-- 自定义题目弹窗 -->
    <div class="overlay" id="customFormOverlay">
        <div class="modal" id="customFormModal">
            <div class="modal-header">
                <h3>✏️ 自定义题目</h3>
                <span class="modal-close" onclick="app.hideCustomForm()">&times;</span>
            </div>
            <form id="customForm" class="custom-form" onsubmit="event.preventDefault();app.submitCustomProblem()">
                <div class="form-row">
                    <label>题型分类</label>
                    <select id="cf-category">
                        <option value="geometry">📐 几何问题</option>
                        <option value="distance">🚗 路程问题</option>
                        <option value="sequence">📊 等比数列</option>
                        <option value="concentration">🧪 浓度问题</option>
                        <option value="cowgrass">🐄 牛吃草问题</option>
                        <option value="work">🔧 工程问题</option>
                        <option value="chicken-rabbit">🐔 鸡兔同笼</option>
                        <option value="profit-loss">⚖️ 盈亏问题</option>
                        <option value="tree-planting">🌲 植树问题</option>
                        <option value="age">👨‍👩‍👧‍👦 年龄问题</option>
                        <option value="sum-diff">🔢 和差倍问题</option>
                    </select>
                </div>
                <div class="form-row form-row-2col">
                    <div>
                        <label>难度</label>
                        <select id="cf-difficulty">
                            <option value="普通">普通</option>
                            <option value="进阶">进阶</option>
                            <option value="挑战">挑战</option>
                        </select>
                    </div>
                    <div>
                        <label>学段</label>
                        <select id="cf-schoolLevel">
                            <option value="小学">小学</option>
                            <option value="初中">初中</option>
                            <option value="高中">高中</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <label>题目内容</label>
                    <textarea id="cf-question" rows="3" placeholder="请输入题目内容..." required></textarea>
                </div>
                <div class="form-row">
                    <label>解题步骤（每行一步）</label>
                    <textarea id="cf-steps" rows="4" placeholder="第一步...
第二步..." required></textarea>
                </div>
                <div class="form-row">
                    <label>答案</label>
                    <input id="cf-answer" type="text" placeholder="请输入答案" required>
                </div>
                <div class="form-row form-row-check">
                    <label>
                        <input id="cf-scratchpad" type="checkbox"> 启用几何草稿画板
                    </label>
                </div>
                <div class="form-actions">
                    <button type="button" id="cf-cancel" class="btn-cancel">取消</button>
                    <button type="submit" id="cf-submit" class="btn-submit">提交题目</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 草稿弹窗 -->
    <div class="overlay" id="scratchpadModal">
        <div class="modal scratchpad-modal" id="scratchpadModalInner">
            <div class="modal-header">
                <h3>📝 草稿板</h3>
                <span class="modal-close" id="spModalClose">&times;</span>
            </div>
            <div class="sp-modal-question" id="spModalQuestion"></div>
            <div class="sp-modal-canvas" id="spModalCanvas">
                <div class="mini-sp-container" id="mini-sp-modal-draft"></div>
            </div>
            <div class="sp-modal-resize-handle" title="拖拽调整弹窗大小">▨</div>
        </div>
    </div>

    <script src="js/problems.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/scratchpad.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
